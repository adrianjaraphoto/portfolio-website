<head>

<body class="gallery-page">
  <a href="#" class="floating-to-top">&#8593;</a>
  <nav class="site-nav">
    <a href="index.html">Work</a>
    <a href="index.html#about">About</a>
    <a href="index.html#contact">Contact</a>
  </nav>

  <header class="gallery-header">
    <h1>SPORTS</h1>
  </header>

  <main class="bento-grid" id="gallery-container">
  </main>

  <div id="imageOverlay" class="overlay">
    <span id="closeBtn" class="close-button">&times;</span>
    <img id="expandedImage" class="overlay-content">
  </div>

  <footer class="site-footer">
    <div class="footer-content">
      <a href="#" class="back-to-top">Back to Top</a>
      
      <div class="footer-socials">
        <a href="https://www.instagram.com/by.adrianj/" target="_blank" rel="noopener noreferrer">Instagram</a>
        <a href="https://www.linkedin.com/in/adjaramillo" target="_blank" rel="noopener noreferrer">LinkedIn</a>
        <a href="mailto:adrianjara.photo@gmail.com">Email</a>
      </div>

      <div class="legal-links">
        <a href="mentions-legales.html">Mentions Légales</a>
        <a href="privacy.html">Privacy Policy</a>
      </div>

      <p>&copy; 2026 Adrian Jaramillo. Tous Droits Réservés.</p>
    </div>
  </footer>

  <script>
    const container = document.getElementById('gallery-container');
    
    // Change this number to match the exact amount of sports photos you have
    const totalPhotos = 3; 
    
    // Overlay elements
    const overlay = document.getElementById('imageOverlay');
    const expandedImage = document.getElementById('expandedImage');
    const closeBtn = document.getElementById('closeBtn');

    // Step 1: Create an array of numbers
    let photoNumbers = [];
    for (let i = 1; i <= totalPhotos; i++) {
      photoNumbers.push(i);
    }

    // Step 2: Shuffle the array (Fisher-Yates algorithm)
    for (let i = photoNumbers.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      let temp = photoNumbers[i];
      photoNumbers[i] = photoNumbers[j];
      photoNumbers[j] = temp;
    }

    // Step 3: Loop through the randomized array to build the grid
    for (let i = 0; i < photoNumbers.length; i++) {
      const currentPhotoNumber = photoNumbers[i];
      
      const div = document.createElement('div');
      div.className = 'grid-item';
      
      // Create the image element directly
      const img = document.createElement('img');
      img.src = `images/sports-images/AdrianJaramilloSports${currentPhotoNumber}.webp`;
      img.alt = `Adrian Jaramillo Sports ${currentPhotoNumber}`;
      img.style.cursor = 'pointer';
      
      // Detect orientation on load to span two columns if wide
      img.onload = function() {
        if (this.naturalWidth > this.naturalHeight) {
          div.classList.add('span-wide');
        }
      };
      
      // Attach the overlay trigger immediately
      img.onclick = function() {
        overlay.style.display = "block";
        expandedImage.src = this.src;
      };

      div.appendChild(img);
      container.appendChild(div);
    }

    // Overlay closing logic
    closeBtn.onclick = function() {
      overlay.style.display = "none";
    }

    overlay.onclick = function(event) {
      if (event.target === overlay) {
        overlay.style.display = "none";
      }
    }
  </script>

</body>
</html>
